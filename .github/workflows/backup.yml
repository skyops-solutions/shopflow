name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # щодня о 2:00 ночі UTC
  workflow_dispatch:       # або вручну через GitHub UI

jobs:
  backup:
    name: Backup PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shopflow
          POSTGRES_USER: shopflow
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pg_dump
        run: sudo apt-get install -y postgresql-client

      - name: Run backup
        env:
          DB_HOST: localhost
          DB_USER: shopflow
          DB_PASSWORD: secret
          DB_NAME: shopflow
        run: |
          mkdir -p /tmp/backups
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/tmp/backups/shopflow_backup_${TIMESTAMP}.sql"
          PGPASSWORD=$DB_PASSWORD pg_dump \
            -h $DB_HOST \
            -U $DB_USER \
            -d $DB_NAME \
            -f "$BACKUP_FILE"
          echo "Backup saved: $BACKUP_FILE"
          ls -lh /tmp/backups/

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: /tmp/backups/*.sql
          retention-days: 7
