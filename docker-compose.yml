services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./shopflow-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://shopflow:secret@postgres:5432/shopflow
    depends_on:
      - postgres

  admin:
    build: ./shopflow-admin
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://shopflow:secret@postgres:5432/shopflow
    depends_on:
      - postgres

  web:
    build: ./shopflow-web
    ports:
      - "8080:80"

volumes:
  pgdata:
